<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis XV - Malvina</title>

<link href="https://fonts.googleapis.com/css2?family=Ephesis&family=Italiana&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  background-image:url("assets/fondo.jpg");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  color:white;
  overflow-x:hidden;
}

/* ================= HERO ================= */

.hero{
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  align-items:center;
  gap:40px;
  text-align:center;
  padding-top:150px;
  padding-bottom:20px;
}

/* ===== TITULO ===== */

.titulo-principal p{
  font-size:3rem;
  letter-spacing:6px;
  font-family:'Italiana', serif;
  text-shadow:0 0 10px rgba(255,255,255,0.6);
}

.titulo-principal h1{
  font-family:'Ephesis', cursive;
  font-size:8rem;
  text-shadow:
    0 0 15px rgba(255,255,255,0.6),
    0 0 40px rgba(186,85,211,0.8);
}

/* ===== BLOQUE HORIZONTAL ===== */

.evento-horizontal{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:100px;
  margin-top:40px;
}

/* ===== CANDELABRO ===== */

.candelabro-centro{
  width:200px;
  filter: drop-shadow(0 0 25px rgba(255,215,0,0.8));
}

/* ================= CAJAS PREMIUM ================= */



.fecha-box:hover,
.hora-box:hover,
.count-box:hover{
  transform:scale(1.05);
}

/* ===== BORDE ANIMADO ===== */

.fecha-box,
.hora-box,
.count-box{
  position:relative;
  width:190px;
  height:190px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  border-radius:22px;

  border:1.5px solid rgba(255,255,255,0.8);

  box-shadow:
    0 0 15px rgba(255,255,255,0.25),
    inset 0 0 10px rgba(255,255,255,0.08);

  overflow:hidden;
  transition:0.3s ease;
}

/* Capa GLASS separada */
.fecha-box::before,
.hora-box::before,
.count-box::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:22px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  z-index:0;
}

/* Aseguramos que el contenido quede arriba */
.fecha-box > *,
.hora-box > *,
.count-box > *{
  position:relative;
  z-index:2;
}

/* LIGHT SWEEP BLANCO */
.fecha-box::after,
.hora-box::after,
.count-box::after {
  content: "";
  position: absolute;
  top: 0;
  left: -60%;
  width: 60%;               /* un poco más ancho para que el sweep sea más notorio */
  height: 100%;
  
  background: linear-gradient(
    120deg,
    transparent 0%,
    rgba(255, 255, 255, 0.7) 50%,   /* baja un poco la opacidad */
    transparent 100%
  );
  
  transform: skewX(-25deg);
  animation: lightSweep 2.2s linear infinite;   /* un poco más lento para mobile */
  
  pointer-events: none;
  z-index: 1;
  
  /* Ayuda a Chrome a renderizar mejor el gradiente sobre blur */
  mix-blend-mode: screen;     /* ← clave: hace que el blanco "ilumine" en vez de oscurecer */
  will-change: transform;     /* fuerza GPU acceleration */
}

@keyframes lightSweep {
  0%   { left: -80%; }
  100% { left: 140%; }
}
/* ===== TIPOGRAFÍA ===== */

.fecha-box,
.hora-box{
  flex-direction:column;
}

.fecha-box .top,
.hora-box .top,
.fecha-box .bottom,
.hora-box .bottom{
  font-family:'Italiana', serif;
  font-size:3rem;
  line-height:1;
}

.count-number{
  font-family:'Italiana', serif;
  font-size:3rem;
  line-height:1;
  width:3ch;
  text-align:center;
  font-variant-numeric: tabular-nums;
}

/* ===== LÍNEA ===== */

.linea{
  width:70%;
  height:3px;
  background:gold;
  margin:6px 0;
  box-shadow:0 0 12px gold;
}

/* ================= CONTADOR ================= */

#countdown{
  padding:20px 20px 60px 20px;
  text-align:center;
}

#countdown h2{
  font-size:3rem;
  margin-bottom:40px;
  font-family:'Italiana', serif;
}

.countdown-container{
  display:flex;
  justify-content:center;
  gap:40px;
  flex-wrap:nowrap;
}

.count-item{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.count-label{
  margin-top:12px;
  font-size:0.8rem;
  letter-spacing:2px;
  font-family:'Italiana', serif;
}

/* ================= UBICACIÓN ================= */

.ubicacion-section{
  text-align:center;
  padding:40px 20px 80px 20px;
}

.divisor-img{
  width:280px;
  max-width:80%;
  margin-bottom:25px;
  filter: drop-shadow(0 0 12px rgba(255,215,0,0.6));
  opacity:0.9;
}

.ubicacion-titulo{
  font-family:'Italiana', serif;
  font-size:3rem;
  letter-spacing:4px;
  text-shadow:0 0 15px rgba(255,255,255,0.6);
}

/* ================= MUSICA ================= */

.music-control{
  position:fixed;
  bottom:30px;
  right:30px;
  background:#9c27b0;
  color:white;
  border:none;
  width:60px;
  height:60px;
  border-radius:50%;
  font-size:1.8rem;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.4);
  z-index:999;
}

.music-control:hover{
  background:#7b1fa2;
}

/* ================= RESPONSIVE ================= */

@media (max-width:768px){

.hero{ padding-top:90px; }

.titulo-principal h1{ font-size:6rem; }

.fecha-box .top,
.fecha-box .bottom,
.hora-box .top,
.hora-box .bottom{
  font-size:1.9rem;
}

.evento-horizontal{ gap:15px; }

.candelabro-centro{ width:130px; }

.fecha-box,
.hora-box,
.count-box{
  width:20vw;
  height:20vw;
  max-width:95px;
  max-height:95px;
}

.count-number{
  font-size:clamp(1.8rem, 6vw, 2.5rem);
}

.linea{
  height:2px;
  margin:4px 0;
}

#countdown h2{ font-size:2.2rem; }

.countdown-container{ gap:10px; }

.ubicacion-titulo{ font-size:2.2rem; }

.divisor-img{ width:200px; }

}

</style>
</head>
<body>

<section class="hero">
  <div class="titulo-principal">
    <p>MIS XV</p>
    <h1>Malvina</h1>
  </div>

  <div class="evento-horizontal">
    <div class="fecha-box">
      <span class="top">21</span>
      <div class="linea"></div>
      <span class="bottom">03</span>
    </div>

    <img src="assets/candelabro.png" alt="candelabro" class="candelabro-centro">

    <div class="hora-box">
      <span class="top">21</span>
      <div class="linea"></div>
      <span class="bottom">HS</span>
    </div>
  </div>
</section>

<section id="countdown">
  <h2>Faltan solo...</h2>

  <div class="countdown-container">
    <div class="count-item">
      <div class="count-box">
        <div class="count-number" id="days">00</div>
      </div>
      <div class="count-label">DÍAS</div>
    </div>

    <div class="count-item">
      <div class="count-box">
        <div class="count-number" id="hours">00</div>
      </div>
      <div class="count-label">HORAS</div>
    </div>

    <div class="count-item">
      <div class="count-box">
        <div class="count-number" id="minutes">00</div>
      </div>
      <div class="count-label">MINUTOS</div>
    </div>

    <div class="count-item">
      <div class="count-box">
        <div class="count-number" id="seconds">00</div>
      </div>
      <div class="count-label">SEGUNDOS</div>
    </div>
  </div>
</section>

<section class="ubicacion-section">
  <img src="assets/divisor.png" alt="divisor decorativo" class="divisor-img">
  <h2 class="ubicacion-titulo">UBICACIÓN</h2>
</section>

<audio id="music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<button class="music-control" onclick="toggleMusic()">♪</button>

<script>

const fechaEvento = new Date("2026-09-27T21:00:00-03:00").getTime();

function actualizarContador(){
  const ahora = new Date().getTime();
  const diferencia = fechaEvento - ahora;

  if(diferencia < 0){
    document.getElementById("countdown").innerHTML = "<h2>¡Llegó el gran día! 💜</h2>";
    return;
  }

  const dias = Math.floor(diferencia / (1000*60*60*24));
  const horas = Math.floor((diferencia % (1000*60*60*24)) / (1000*60*60));
  const minutos = Math.floor((diferencia % (1000*60*60)) / (1000*60));
  const segundos = Math.floor((diferencia % (1000*60)) / 1000);

  document.getElementById("days").textContent = dias.toString().padStart(2,'0');
  document.getElementById("hours").textContent = horas.toString().padStart(2,'0');
  document.getElementById("minutes").textContent = minutos.toString().padStart(2,'0');
  document.getElementById("seconds").textContent = segundos.toString().padStart(2,'0');
}

setInterval(actualizarContador,1000);
actualizarContador();

const audio = document.getElementById("music");

function toggleMusic(){
  if(audio.paused){
    audio.play().catch(()=>{});
  }else{
    audio.pause();
  }
}

</script>

</body>
</html>
