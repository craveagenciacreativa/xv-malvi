<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis XV - Malvina</title>

<link href="https://fonts.googleapis.com/css2?family=Ephesis&family=Italiana&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  font-family:'Poppins',sans-serif;
  background-image:url("assets/fondo.jpg");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  color:white;
  overflow-x:hidden;
}

/* ================= HERO ================= */
.hero {
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  align-items:center;
  gap:40px;
  text-align:center;
  padding-top:150px;
  padding-bottom:20px;
}

/* ===== TITULO ===== */
.titulo-principal p {
  font-size:3rem;
  letter-spacing:6px;
  font-family:'Italiana', serif;
  text-shadow:0 0 10px rgba(255,255,255,0.6);
}

.titulo-principal h1 {
  font-family:'Ephesis', cursive;
  font-size:8rem;
  text-shadow:
    0 0 15px rgba(255,255,255,0.6),
    0 0 40px rgba(186,85,211,0.8);
}

/* ===== BLOQUE HORIZONTAL ===== */
.evento-horizontal {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:100px;
  margin-top:40px;
}

/* ===== CANDELABRO ===== */
.candelabro-centro {
  width:200px;
  filter: drop-shadow(0 0 25px rgba(255,215,0,0.8));
}

/* ================= CAJAS PREMIUM ================= */
.fecha-box:hover,
.hora-box:hover,
.count-box:hover,
.ubicacion-box:hover {
  transform:scale(1.05);
}

.fecha-box,
.hora-box,
.count-box,
.ubicacion-box {
  position:relative;
  border-radius:22px;
  border:1.5px solid rgba(255,255,255,0.8);
  box-shadow:
    0 0 15px rgba(255,255,255,0.25),
    inset 0 0 10px rgba(255,255,255,0.08);
  overflow:hidden;
  transition:0.3s ease;
  text-align:center;
}

.fecha-box,
.hora-box,
.count-box {
  width:190px;
  height:190px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.ubicacion-box {
  width: 340px;
  height: auto;
  min-height: 190px;
  padding: 25px 20px;
  margin: 0 auto 30px auto;
  display: block;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap: 12px;
}

/* Glass y sweep */
.fecha-box::before,
.hora-box::before,
.count-box::before,
.ubicacion-box::before {
  content:"";
  position:absolute;
  inset:0;
  border-radius:22px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index:0;
}

.fecha-box > *,
.hora-box > *,
.count-box > *,
.ubicacion-box > * {
  position:relative;
  z-index:2;
}

.fecha-box::after,
.hora-box::after,
.count-box::after,
.ubicacion-box::after {
  content: "";
  position: absolute;
  top: 0;
  left: -60%;
  width: 60%;
  height: 100%;
  background: linear-gradient(
    120deg,
    transparent 0%,
    rgba(255, 255, 255, 0.7) 50%,
    transparent 100%
  );
  transform: skewX(-25deg);
  animation: lightSweep 2.2s linear infinite;
  pointer-events: none;
  z-index: 1;
  mix-blend-mode: screen;
  will-change: transform;
}

@keyframes lightSweep {
  0%   { left: -80%; }
  100% { left: 140%; }
}

/* Tipografía fecha/hora/countdown */
.fecha-box .top,
.fecha-box .bottom,
.hora-box .top,
.hora-box .bottom {
  font-family:'Italiana', serif;
  font-size:3rem;
  line-height:1;
}

.count-number {
  font-family:'Italiana', serif;
  font-size:3rem;
  line-height:1;
  width:3ch;
  text-align:center;
  font-variant-numeric: tabular-nums;
}

.linea {
  width:70%;
  height:3px;
  background:gold;
  margin:6px 0;
  box-shadow:0 0 12px gold;
}

/* Ubicación box */
.ubicacion-box .salon {
  font-family: 'Italiana', serif;
  font-size: 2.5rem;
  color: gold;
  text-shadow: 0 0 10px gold;
  margin: 0;
}

.ubicacion-box .direccion {
  font-family: 'Poppins', sans-serif;
  font-size: 1.1rem;
  line-height: 1.4;
  opacity: 0.95;
  margin: 0;
}

/* ================= CONTADOR ================= */
#countdown {
  padding:20px 20px 15px 20px;
  text-align:center;
}

#countdown h2 {
  font-size:3rem;
  margin-bottom:30px;
  font-family:'Italiana', serif;
}

.countdown-container {
  display:flex;
  justify-content:center;
  gap:40px;
  flex-wrap:nowrap;
}

.count-item {
  display:flex;
  flex-direction:column;
  align-items:center;
}

.count-label {
  margin-top:12px;
  font-size:0.8rem;
  letter-spacing:2px;
  font-family:'Italiana', serif;
}

/* ================= UBICACIÓN ================= */
.ubicacion-section {
  text-align:center;
  padding: 15px 20px 30px 20px;
}

.divisor-img {
  width: 100%;
  max-width: 100%;
  height: auto;
  margin: 0 auto 10px auto;
  display: block;
  filter: drop-shadow(0 0 12px rgba(255,215,0,0.6));
  opacity: 0.9;
}

.ubicacion-titulo,
.itinerario-titulo {
  font-family:'Italiana', serif;
  font-size:3rem;
  letter-spacing:4px;
  text-shadow:0 0 15px rgba(255,255,255,0.6);
  margin-bottom: 12px;
}

/* ================= ITINERARIO ================= */
.itinerario-section {
  text-align:center;
  padding: 10px 20px 120px 20px;
}

.itinerario-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 25px;
  margin-top: 30px;
}

.itinerario-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.itinerario-icon {
  width: 90px;
  height: 90px;
  object-fit: contain;
}

.itinerario-time {
  font-family: 'Italiana', serif;
  font-size: 2.2rem;
  color: gold;
  text-shadow: 0 0 12px gold;
}

.separator-dots {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: linear-gradient(135deg, #c0c0c0, #808080, #c0c0c0);
  box-shadow: 0 0 8px rgba(192,192,192,0.6);
}

.map-wrapper {
  position: relative;
  width: 90%;
  max-width: 800px;
  margin: 0 auto 10px auto;
  padding-bottom: 56.25%;
  height: 0;
  overflow: hidden;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(186,85,211,0.4);
}

.map-wrapper iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: 0;
}

/* ================= CAMPANA ================= */
.bell-container {
  position: relative;
  display: inline-block;
  width: 100px;
  height: 100px;
  margin: 40px auto 40px;
  cursor: pointer;
}

.bell-container:hover {
  transform: scale(1.1);
}

.bell-icon {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.sound-waves {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.wave {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 60px;
  height: 60px;
  border: 3px solid #d4af37;
  border-radius: 50%;
  transform: translate(-50%, -50%) scale(0);
  opacity: 0;
  box-sizing: border-box;
}

.bell-container:hover .wave {
  animation: ring-wave 2.2s ease-out forwards;
}

.wave:nth-child(1) { animation-delay: 0.1s; }
.wave:nth-child(2) { animation-delay: 0.45s; }
.wave:nth-child(3) { animation-delay: 0.8s; }

@keyframes ring-wave {
  0%   { transform: translate(-50%, -50%) scale(0.4); opacity: 0.85; }
  50%  { opacity: 0.5; }
  100% { transform: translate(-50%, -50%) scale(3.5); opacity: 0; }
}

/* ================= MUSICA ================= */
.music-control {
  position:fixed;
  bottom:30px;
  right:30px;
  background:#9c27b0;
  color:white;
  border:none;
  width:60px;
  height:60px;
  border-radius:50%;
  font-size:1.8rem;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.4);
  z-index:999;
}

.music-control:hover {
  background:#7b1fa2;
}

/* ================= RESPONSIVE ================= */
@media (max-width:768px) {
  .hero { padding-top:90px; }
  .titulo-principal h1 { font-size:6rem; }
  .fecha-box .top,
  .fecha-box .bottom,
  .hora-box .top,
  .hora-box .bottom { font-size:1.9rem; }
  .evento-horizontal { gap:15px; }
  .candelabro-centro { width:130px; }
  .fecha-box,
  .hora-box,
  .count-box {
    width:20vw;
    height:20vw;
    max-width:95px;
    max-height:95px;
  }
  .count-number { font-size:clamp(1.8rem, 6vw, 2.5rem); }
  .linea { height:2px; margin:4px 0; }
  #countdown {
    padding:15px 15px 10px 15px;
  }
  #countdown h2 { font-size:2.2rem; margin-bottom:20px; }
  .countdown-container { gap:10px; }
  .ubicacion-section {
    padding: 10px 10px 20px 10px;
  }
  .divisor-img { 
    width: 100%;
    max-width: 100%;
    margin: 0 auto 8px auto;
  }
  .ubicacion-titulo,
  .itinerario-titulo { 
    font-size:2.2rem; 
    margin-bottom: 10px; 
  }
  .ubicacion-box {
    width: 92%;
    padding: 18px 12px;
    min-height: 140px;
  }
  .ubicacion-box .salon { font-size: 2.1rem; }
  .ubicacion-box .direccion { font-size: 0.95rem; }
  .map-wrapper { 
    width: 96%; 
    padding-bottom: 70%; 
    margin-bottom: 8px;
  }
  .itinerario-section {
    padding-top: 5px;
    padding-bottom: 80px;
  }
  .bell-container {
    width: 80px;
    height: 80px;
    margin: 30px auto 30px;
  }
  .itinerario-icon {
    width: 70px;
    height: 70px;
  }
  .itinerario-time {
    font-size: 1.8rem;
  }
  .dot {
    width: 10px;
    height: 10px;
  }
  .itinerario-container {
    gap: 20px;
  }
  body {
    background-attachment: scroll !important;
  }
}
</style>
</head>
<body>

<section class="hero">
  <div class="titulo-principal">
    <p>MIS XV</p>
    <h1>Malvina</h1>
  </div>

  <div class="evento-horizontal">
    <div class="fecha-box">
      <span class="top">21</span>
      <div class="linea"></div>
      <span class="bottom">03</span>
    </div>

    <img src="assets/candelabro.png" alt="candelabro" class="candelabro-centro">

    <div class="hora-box">
      <span class="top">21</span>
      <div class="linea"></div>
      <span class="bottom">HS</span>
    </div>
  </div>
</section>

<section id="countdown">
  <h2>Faltan solo...</h2>

  <div class="countdown-container">
    <div class="count-item">
      <div class="count-box">
        <div class="count-number" id="days">00</div>
      </div>
      <div class="count-label">DÍAS</div>
    </div>

    <div class="count-item">
      <div class="count-box">
        <div class="count-number" id="hours">00</div>
      </div>
      <div class="count-label">HORAS</div>
    </div>

    <div class="count-item">
      <div class="count-box">
        <div class="count-number" id="minutes">00</div>
      </div>
      <div class="count-label">MINUTOS</div>
    </div>

    <div class="count-item">
      <div class="count-box">
        <div class="count-number" id="seconds">00</div>
      </div>
      <div class="count-label">SEGUNDOS</div>
    </div>
  </div>
</section>

<section class="ubicacion-section">
  <img src="assets/divisor.png" alt="divisor decorativo" class="divisor-img">
  <h2 class="ubicacion-titulo">Ubicación</h2>
  <div class="ubicacion-box">
    <div class="salon">Salón UPCN</div>
    <div class="direccion">General Artigas y Los Lapachos,<br>Candelaria, Misiones</div>
  </div>
  <div class="map-wrapper">
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1104.9572330072972!2d-55.74033298950951!3d-27.483260116431328!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9457cf4336f4da2f%3A0x6433ed96a3d570da!2sClub%20UPCN!5e1!3m2!1ses!2sar!4v1772512945819!5m2!1ses!2sar" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
  </div>
</section>

<section class="itinerario-section">
  <img src="assets/divisor.png" alt="divisor decorativo" class="divisor-img">
  <h2 class="itinerario-titulo">Itinerario</h2>

  <!-- Campana sin efectos -->
  <div class="bell-container">
    <img src="assets/campana.png" alt="Campana" class="bell-icon">
    <div class="sound-waves">
      <div class="wave"></div>
      <div class="wave"></div>
      <div class="wave"></div>
    </div>
  </div>

  <!-- Itinerario detallado -->
  <div class="itinerario-container">
    <div class="itinerario-item">
      <p class="itinerario-time">Convocatoria 21:00hs</p>
    </div>

    <div class="separator-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="itinerario-item">
      <img src="assets/cena.png" alt="Cena" class="itinerario-icon">
      <p class="itinerario-time">Cena 22:45hs</p>
    </div>

    <div class="separator-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="itinerario-item">
      <img src="assets/vals.png" alt="Vals" class="itinerario-icon">
      <p class="itinerario-time">Vals 00:30hs</p>
    </div>
  </div>
</section>

<audio id="music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<button class="music-control" id="musicBtn" onclick="toggleMusic()">▶</button>

<script>
const fechaEvento = new Date("2026-09-27T21:00:00-03:00").getTime();

function actualizarContador(){
  const ahora = new Date().getTime();
  const diferencia = fechaEvento - ahora;

  if(diferencia < 0){
    document.getElementById("countdown").innerHTML = "<h2>¡Llegó el gran día! 💜</h2>";
    return;
  }

  const dias = Math.floor(diferencia / (1000*60*60*24));
  const horas = Math.floor((diferencia % (1000*60*60*24)) / (1000*60*60));
  const minutos = Math.floor((diferencia % (1000*60*60)) / (1000*60));
  const segundos = Math.floor((diferencia % (1000*60)) / 1000);

  document.getElementById("days").textContent = dias.toString().padStart(2,'0');
  document.getElementById("hours").textContent = horas.toString().padStart(2,'0');
  document.getElementById("minutes").textContent = minutos.toString().padStart(2,'0');
  document.getElementById("seconds").textContent = segundos.toString().padStart(2,'0');
}

setInterval(actualizarContador,1000);
actualizarContador();

const audio = document.getElementById("music");

function toggleMusic(){
  if(audio.paused){
    audio.play().catch(()=>{});
    document.getElementById("musicBtn").textContent = "‖";
  } else {
    audio.pause();
    document.getElementById("musicBtn").textContent = "▶";
  }
}
</script>

</body>
</html>
